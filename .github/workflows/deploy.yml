name: Deploy to Cloudflare Pages
# Redeploys the app on every push to main.
# Requires ONE repository secret (Settings → Secrets and variables → Actions → Repository secrets):
#   CLOUDFLARE_API_TOKEN — a token with "Cloudflare Pages: Edit" permission (Jedrock account)
# The account ID below is not sensitive, so it's set inline.
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e14433887ee3f4078ca73d1527227e73
          command: pages deploy --branch main
