<text x="874" y="186" font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#8A97A8" letter-spacing="2">▲ 03 · TERTIARY</text>
<text x="874" y="222" font-size="22" font-weight="700" fill="#0C1B2A">Founder Priya, 41</text>
<text x="874" y="245" font-size="13" fill="#6C7A8C">Non-technical, validated idea + budget</text>
<line x1="874" y1="262" x2="1212" y2="262" stroke="#E7ECF2"/>
<text x="874" y="288" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">SNAPSHOT</text>
<text x="874" y="306" font-size="12.5" fill="#37455A">Ex-consultant with real budget;</text>
<text x="874" y="323" font-size="12.5" fill="#37455A">can’t build it herself.</text>
<text x="874" y="353" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">JOBS TO BE DONE</text>
<text x="874" y="371" font-size="12.5" fill="#37455A">Turn the idea into a product</text>
<text x="874" y="388" font-size="12.5" fill="#37455A">Feel capable, not dependent</text>
<text x="874" y="405" font-size="12.5" fill="#37455A">Be a founder who builds</text>
