<svg viewBox="0 0 1720 1204" xmlns="http://www.w3.org/2000/svg" role="img" fill="#ECEEF1">
<title>ScaleWithMe — Who We Build For (four ranked personas)</title>
<desc>Customer-strategy poster: Reset Rachel (AI-Displaced Professional, primary beachhead) leads; Stuck Shipper, Vision-First Founder, and AI-Curious Owner served through different products. Ranked by pain, reach, willingness-to-pay, proof, fit, and market.</desc>
<style>
  text{font-family:'Helvetica Neue',Arial,sans-serif}
  .m{font-family:'SF Mono',ui-monospace,Menlo,monospace}
  .lime{fill:#C7F53E}.mut{fill:#9AA0A8}.dim{fill:#656C76}.ink{fill:#ECEEF1}.dk{fill:#0C0D10}
  .t{letter-spacing:1.5px}.tt{letter-spacing:2px}
</style>
<rect width="1720" height="1204" fill="#0C0D10"/>

<!-- header -->
<text x="48" y="52" class="m lime tt" font-size="13">SCALEWITHME   ·   CUSTOMER STRATEGY   ·   2026</text>
<text x="46" y="122" class="sans" font-size="60" font-weight="800" letter-spacing="-1">WHO WE BUILD <tspan class="lime">FOR</tspan></text>
<text x="1672" y="66" text-anchor="end" font-size="18" font-weight="700">One funnel does not fit all four.</text>
<text x="1672" y="92" text-anchor="end" class="mut" font-size="13.5">Ranked by pain × reach × willingness-to-pay × proof × fit × market — lead with <tspan class="lime" font-weight="700">#1</tspan>,</text>
<text x="1672" y="111" text-anchor="end" class="mut" font-size="13.5">then serve the rest through different products.</text>
<text x="1672" y="141" text-anchor="end" class="m dim t" font-size="11">SCORE ▪ PAIN · REACH · PAY · PROOF · FIT · MARKET</text>
<line x1="48" y1="168" x2="1672" y2="168" stroke="#22242A" stroke-width="1"/>

<!-- ================= HERO CARD (01) ================= -->
<rect x="48" y="196" width="786" height="858" rx="14" fill="#141519" stroke="#3A3D45" stroke-width="1.5"/>
<text x="470" y="560" class="sans" font-size="300" font-weight="800" fill="#191B21">01</text>
<!-- pill -->
<rect x="82" y="224" width="286" height="26" rx="5" fill="#C7F53E"/>
<text x="97" y="242" class="m t" font-size="12" font-weight="700" fill="#0C0D10">RANK 01 · PRIMARY · BEACHHEAD</text>
<text x="80" y="304" class="sans" font-size="44" font-weight="800">Reset Rachel <tspan class="lime">43</tspan></text>
<text x="82" y="332" class="m tt mut" font-size="12">THE AI-DISPLACED PROFESSIONAL</text>
<!-- quote -->
<rect x="82" y="356" width="4" height="54" rx="2" fill="#C7F53E"/>
<text x="104" y="382" class="sans" font-size="23" font-style="italic" font-weight="700">“The tool that replaced her</text>
<text x="104" y="410" class="sans" font-size="23" font-style="italic" font-weight="700">is her leverage.”</text>
<!-- paragraph -->
<text x="82" y="452" font-size="14.5" fill="#A7ADB6">Laid off when AI automated her function — 15-yr marketing / ops</text>
<text x="82" y="474" font-size="14.5" fill="#A7ADB6">pro on a severance runway. Low-tech, AI-anxious. <tspan class="ink" font-weight="700">Deep domain</tspan></text>
<text x="82" y="496" font-size="14.5" class="ink" font-weight="700">expertise and existential urgency, but no path to convert it</text>
<text x="82" y="518" font-size="14.5" class="ink" font-weight="700">into income she owns — every existing option retrains her</text>
<text x="82" y="540" font-size="14.5" class="ink" font-weight="700">for another automatable job.</text>
<!-- bar glyph + scores -->
<g fill="#C7F53E">
<rect x="82" y="586" width="11" height="22"/><rect x="98" y="578" width="11" height="30"/><rect x="114" y="582" width="11" height="26"/><rect x="130" y="568" width="11" height="40"/><rect x="146" y="574" width="11" height="34"/><rect x="162" y="560" width="11" height="48"/>
</g>
<g class="m" font-size="12.5">
<text x="272" y="576" class="dim t">PAIN</text><text x="356" y="576" class="ink" font-weight="700">V.HIGH</text>
<text x="452" y="576" class="dim t">PROOF</text><text x="540" y="576" class="ink" font-weight="700">V.HIGH</text>
<text x="272" y="596" class="dim t">REACH</text><text x="356" y="596" class="ink" font-weight="700">HIGH</text>
<text x="452" y="596" class="dim t">FIT</text><text x="540" y="596" class="ink" font-weight="700">HIGH</text>
<text x="272" y="616" class="dim t">PAY</text><text x="356" y="616" class="ink" font-weight="700">MED-HI</text>
<text x="452" y="616" class="dim t">MARKET</text><text x="540" y="616" class="ink" font-weight="700">V.HIGH</text>
</g>
<line x1="82" y1="638" x2="754" y2="638" stroke="#22242A" stroke-width="1"/>
<!-- 2x2 mini cells -->
<g>
<text x="82" y="666" class="m t" font-size="10.5" fill="#93A06A">HIGHEST PAIN</text>
<text x="82" y="686" font-size="13" fill="#B8BEC6">Existential loss + a severance clock.</text>
<text x="452" y="666" class="m t" font-size="10.5" fill="#93A06A">LARGEST &amp; GROWING</text>
<text x="452" y="686" font-size="13" fill="#B8BEC6">AI-cited layoffs ≈ 56% of all</text>
<text x="452" y="704" font-size="13" fill="#B8BEC6">layoffs, climbing.</text>
<text x="82" y="734" class="m t" font-size="10.5" fill="#93A06A">MOST VIRAL PROOF</text>
<text x="82" y="754" font-size="13" fill="#B8BEC6">Income rebuilt beats a revenue</text>
<text x="82" y="772" font-size="13" fill="#B8BEC6">screenshot.</text>
<text x="452" y="734" class="m t" font-size="10.5" fill="#93A06A">BIGGEST GAP</text>
<text x="452" y="754" font-size="13" fill="#B8BEC6">Everyone retrains her for another</text>
<text x="452" y="772" font-size="13" fill="#B8BEC6">job; nobody helps her build her own.</text>
</g>
<!-- risk box -->
<rect x="82" y="792" width="672" height="56" rx="8" fill="#101216"/>
<rect x="82" y="792" width="4" height="56" rx="2" fill="#C7F53E"/>
<text x="100" y="816" class="m" font-size="12.5"><tspan class="lime" font-weight="700">RISK TO MANAGE →</tspan> <tspan class="mut">ability-to-pay / runway + high-touch delivery. Answer: results-first</tspan></text>
<text x="100" y="834" class="m mut" font-size="12.5">ladder + rigorous proof-over-promise.</text>
<line x1="82" y1="872" x2="754" y2="872" stroke="#22242A" stroke-width="1"/>
<text x="82" y="900" class="m t" font-size="12"><tspan class="dim">FIND HER</tspan>  <tspan class="ink">LinkedIn “open to work”   ·   r/layoffs</tspan></text>
<text x="82" y="938" class="m" font-size="13"><tspan class="dim">TAM</tspan> <tspan class="ink" font-weight="700">~1M/yr</tspan>   <tspan class="dim">SAM</tspan> <tspan class="ink" font-weight="700">~150K</tspan>   <tspan class="dim">SOM y1</tspan> <tspan class="ink" font-weight="700">~1,000</tspan> → <tspan class="lime" font-weight="700">~$1.5M ARR</tspan></text>
<rect x="82" y="972" width="524" height="46" rx="8" fill="#C7F53E"/>
<text x="102" y="1001" class="m" font-size="13" font-weight="700" fill="#0C0D10">SERVE VIA ▸ FREE ASSESSMENT → 90-DAY PROGRAM</text>

<!-- ================= CARD 02 ================= -->
<rect x="858" y="196" width="814" height="300" rx="12" fill="#141519" stroke="#2A2C33" stroke-width="1.5"/>
<rect x="858" y="196" width="4" height="300" rx="2" fill="#C7F53E"/>
<text x="1600" y="470" class="sans" font-size="210" font-weight="800" fill="#191B21" text-anchor="end">02</text>
<text x="888" y="232" class="m t" font-size="12"><tspan class="lime" font-weight="700">RANK 02 · SECONDARY</tspan>  <tspan class="dim">THE STUCK SHIPPER</tspan></text>
<g fill="#C7F53E"><rect x="1548" y="222" width="9" height="14"/><rect x="1561" y="216" width="9" height="20"/><rect x="1574" y="226" width="9" height="10"/><rect x="1587" y="212" width="9" height="24"/><rect x="1600" y="220" width="9" height="16"/><rect x="1613" y="210" width="9" height="26"/></g>
<text x="888" y="272" class="sans" font-size="27" font-weight="800">Shipping Sam <tspan class="lime">32</tspan></text>
<text x="888" y="306" font-size="14.5" fill="#C6CBD3">Technical builder who can ship but can’t sell — shipped a product, got crickets. Treats selling</text>
<text x="888" y="326" font-size="14.5" fill="#C6CBD3">as an afterthought, no best-fit-customer to aim at. <tspan class="mut">Best pure economics; also absorbs the</tspan></text>
<text x="888" y="346" font-size="14.5" class="mut">technical laid-off worker.</text>
<text x="888" y="392" class="m" font-size="12.5"><tspan class="dim">TAM</tspan> <tspan class="ink">~2M</tspan>   <tspan class="dim">SAM</tspan> <tspan class="ink">~250K</tspan>   <tspan class="dim">SOM y1</tspan> <tspan class="ink">~800 → ~$1.1M</tspan>      <tspan class="dim">FIND</tspan> <tspan class="ink">X #buildinpublic · r/ClaudeAI</tspan></text>
<rect x="888" y="428" width="232" height="36" rx="7" fill="#C7F53E"/>
<text x="904" y="452" class="m t" font-size="12" font-weight="700" fill="#0C0D10">SERVE → MEMBERSHIP</text>

<!-- ================= CARD 03 ================= -->
<rect x="858" y="520" width="814" height="258" rx="12" fill="#141519" stroke="#2A2C33" stroke-width="1.5"/>
<rect x="858" y="520" width="4" height="258" rx="2" fill="#C7F53E"/>
<text x="1600" y="770" class="sans" font-size="210" font-weight="800" fill="#191B21" text-anchor="end">03</text>
<text x="888" y="556" class="m t" font-size="12"><tspan class="lime" font-weight="700">RANK 03 · TERTIARY</tspan>  <tspan class="dim">THE VISION-FIRST FOUNDER</tspan></text>
<g fill="#C7F53E"><rect x="1548" y="546" width="9" height="14"/><rect x="1561" y="540" width="9" height="20"/><rect x="1574" y="550" width="9" height="10"/><rect x="1587" y="536" width="9" height="24" fill="#6E7A3E"/><rect x="1600" y="544" width="9" height="16" fill="#6E7A3E"/><rect x="1613" y="534" width="9" height="26" fill="#6E7A3E"/></g>
<text x="888" y="596" class="sans" font-size="27" font-weight="800">Founder Priya <tspan class="lime">41</tspan></text>
<text x="888" y="630" font-size="14.5" fill="#C6CBD3">Non-technical operator, validated idea + real budget, can’t turn it into a product — devs</text>
<text x="888" y="650" font-size="14.5" fill="#C6CBD3">are costly and slow, no-code caps out. <tspan class="mut">Converts readily; DFY is the escape hatch.</tspan></text>
<text x="888" y="696" class="m" font-size="12.5"><tspan class="dim">TAM</tspan> <tspan class="ink">~3M</tspan>   <tspan class="dim">SAM</tspan> <tspan class="ink">~150K</tspan>   <tspan class="dim">SOM y1</tspan> <tspan class="ink">~400 → ~$1-2M</tspan>      <tspan class="dim">FIND</tspan> <tspan class="ink">YouTube · LinkedIn</tspan></text>
<rect x="888" y="726" width="272" height="36" rx="7" fill="none" stroke="#C7F53E" stroke-width="1.5"/>
<text x="904" y="750" class="m t lime" font-size="12" font-weight="700">SERVE → GUIDED BUILD / DFY</text>

<!-- ================= CARD 04 ================= -->
<rect x="858" y="802" width="814" height="252" rx="12" fill="#141519" stroke="#2A2C33" stroke-width="1.5"/>
<rect x="858" y="802" width="4" height="252" rx="2" fill="#C7F53E"/>
<text x="1600" y="1050" class="sans" font-size="210" font-weight="800" fill="#191B21" text-anchor="end">04</text>
<text x="888" y="838" class="m t" font-size="12"><tspan class="lime" font-weight="700">RANK 04 · QUATERNARY</tspan>  <tspan class="dim">THE AI-CURIOUS OWNER</tspan></text>
<g fill="#C7F53E"><rect x="1548" y="828" width="9" height="14"/><rect x="1561" y="822" width="9" height="20"/><rect x="1574" y="832" width="9" height="10"/><rect x="1587" y="818" width="9" height="24"/><rect x="1600" y="826" width="9" height="16"/><rect x="1613" y="816" width="9" height="26"/></g>
<text x="888" y="878" class="sans" font-size="27" font-weight="800">Owner Dave <tspan class="lime">52</tspan></text>
<text x="888" y="912" font-size="14.5" fill="#C6CBD3">Established SMB owner quietly losing time or money to one manual bottleneck. Knows AI</text>
<text x="888" y="932" font-size="14.5" fill="#C6CBD3">could help but can’t tell real from hype and has no time to figure it out. <tspan class="mut">Buys outcomes,</tspan></text>
<text x="888" y="952" font-size="14.5" class="mut">not a membership.</text>
<text x="888" y="998" class="m" font-size="12.5"><tspan class="dim">TAM</tspan> <tspan class="ink">~33M</tspan>   <tspan class="dim">SAM</tspan> <tspan class="ink">~2M</tspan>   <tspan class="dim">SOM y1</tspan> <tspan class="ink">~$0.5-1M</tspan>      <tspan class="dim">FIND</tspan> <tspan class="ink">Industry FB groups · YouTube</tspan></text>
<rect x="888" y="1006" width="264" height="36" rx="7" fill="none" stroke="#C7F53E" stroke-width="1.5"/>
<text x="904" y="1030" class="m t lime" font-size="12" font-weight="700">SERVE → À-LA-CARTE TOOLS</text>

