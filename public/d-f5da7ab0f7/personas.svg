<text x="62" y="186" font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#0E8FA6" letter-spacing="2">▲ 01 · PRIMARY</text>
<text x="62" y="222" font-size="22" font-weight="700" fill="#0C1B2A">Reset Rachel, 43</text>
<text x="62" y="245" font-size="13" fill="#6C7A8C">Laid off when AI automated her function</text>
<line x1="62" y1="262" x2="400" y2="262" stroke="#E7ECF2"/>
<text x="62" y="288" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">SNAPSHOT</text>
<text x="62" y="306" font-size="12.5" fill="#37455A">15-yr marketing/ops pro; severance</text>
<text x="62" y="323" font-size="12.5" fill="#37455A">runway. Low tech, AI-anxious.</text>
<text x="62" y="353" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">JOBS TO BE DONE</text>
<text x="62" y="371" font-size="12.5" fill="#37455A">Replace income fast, on her own terms</text>
<text x="62" y="388" font-size="12.5" fill="#37455A">Regain agency after the layoff</text>
<text x="62" y="405" font-size="12.5" fill="#37455A">Be seen as adapted, not replaced</text>
<text x="62" y="435" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">ACUTE PROBLEM</text>
<text x="62" y="453" font-size="12.5" fill="#37455A">Deep expertise + urgency, but no path</text>
<text x="62" y="470" font-size="12.5" fill="#37455A">to turn it into income she owns.</text>
<text x="62" y="500" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">CHANNELS</text>
<text x="62" y="518" font-size="12.5" fill="#0E8FA6">▸ LinkedIn “open to work” + r/layoffs</text>
