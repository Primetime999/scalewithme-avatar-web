<text x="1672" y="1108" text-anchor="end" class="m dim" font-size="10.5">Order-of-magnitude planning assumptions (US, ~$1.5K/yr blended ARPU) — pressure-test, not validated.</text>
<text x="1672" y="1124" text-anchor="end" class="m dim" font-size="10.5">Overlap: technical-displaced ⊂ Stuck Shipper. Firm up SOM with real channel→signup→paid data.</text>
