<rect x="1258" y="150" width="382" height="6" rx="3" fill="#C6CFDB"/>
<text x="1280" y="186" font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#8A97A8" letter-spacing="2">▲ 04 · QUATERNARY</text>
<text x="1280" y="222" font-size="22" font-weight="700" fill="#0C1B2A">Owner Dave, 52</text>
<text x="1280" y="245" font-size="13" fill="#6C7A8C">SMB owner, one costly bottleneck</text>
<line x1="1280" y1="262" x2="1618" y2="262" stroke="#E7ECF2"/>
<text x="1280" y="288" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">SNAPSHOT</text>
<text x="1280" y="306" font-size="12.5" fill="#37455A">Owner-operator, 5–50 staff,</text>
<text x="1280" y="323" font-size="12.5" fill="#37455A">time-poor, delegates.</text>
<text x="1280" y="353" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">JOBS TO BE DONE</text>
<text x="1280" y="371" font-size="12.5" fill="#37455A">Save time / make money</text>
<text x="1280" y="388" font-size="12.5" fill="#37455A">Not fall behind on AI</text>
<text x="1280" y="405" font-size="12.5" fill="#37455A">Look sharp to peers</text>
<text x="1280" y="435" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">ACUTE PROBLEM</text>
<text x="1280" y="453" font-size="12.5" fill="#37455A">A manual bottleneck bleeds money;</text>
<text x="1280" y="470" font-size="12.5" fill="#37455A">can’t tell real AI from hype.</text>
<text x="1280" y="500" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">CHANNELS</text>
<text x="1280" y="518" font-size="12.5" fill="#0E8FA6">▸ Industry FB groups + YouTube</text>
<rect x="1280" y="624" width="338" height="34" rx="7" fill="#EFF3F8"/>
<text x="1294" y="646" font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#55627A">SERVE VIA ▸ À-la-carte tools ↗</text>
<text x="40" y="700" font-family="'SF Mono','Menlo',monospace" font-size="12.5" fill="#93A0B0">// one funnel doesn’t fit all four — build the tech, then sell it</text>
<text x="1640" y="700" text-anchor="end" font-family="'SF Mono','Menlo',monospace" font-size="12.5" fill="#0E8FA6">scalewithme ↗</text>
