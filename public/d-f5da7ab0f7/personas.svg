<text x="874" y="453" font-size="12.5" fill="#37455A">Has the idea and the budget, but every</text>
<text x="874" y="470" font-size="12.5" fill="#37455A">route to “built” is costly or slow.</text>
<text x="874" y="500" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">CHANNELS</text>
<text x="874" y="518" font-size="12.5" fill="#0E8FA6">▸ YouTube (high-intent) + LinkedIn</text>
<rect x="874" y="624" width="338" height="34" rx="7" fill="#EFF3F8"/>
<text x="888" y="646" font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#55627A">SERVE VIA ▸ Guided build / DFY ↗</text>
