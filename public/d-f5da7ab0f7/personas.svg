<text x="468" y="306" font-size="12.5" fill="#37455A">Self-taught full-stack; ships a</text>
<text x="468" y="323" font-size="12.5" fill="#37455A">micro-SaaS at night.</text>
<text x="468" y="353" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">JOBS TO BE DONE</text>
<text x="468" y="371" font-size="12.5" fill="#37455A">First 10 paying customers</text>
<text x="468" y="388" font-size="12.5" fill="#37455A">Feel legitimate, not a hobbyist</text>
<text x="468" y="405" font-size="12.5" fill="#37455A">Post a real revenue screenshot</text>
<text x="468" y="435" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">ACUTE PROBLEM</text>
<text x="468" y="453" font-size="12.5" fill="#37455A">Shipped a working product, got</text>
<text x="468" y="470" font-size="12.5" fill="#37455A">crickets — features won’t fix it.</text>
<text x="468" y="500" font-family="'SF Mono','Menlo',monospace" font-size="10.5" fill="#97A2B2" letter-spacing="1.5">CHANNELS</text>
<text x="468" y="518" font-size="12.5" fill="#0E8FA6">▸ X #buildinpublic + r/ClaudeAI</text>
