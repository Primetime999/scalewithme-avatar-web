<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avatar Builder — ScaleWithMe</title>
<style>
  :root{
    --bg:#FFFFFF;--grid:#F0F3F7;--ink:#0C1B2A;--muted:#6C7A8C;--faint:#97A2B2;
    --line:#E7ECF2;--border:#D8DFEA;--panel:#FBFDFE;
    --cyan:#12B5CE;--cyan-deep:#0E8FA6;--chip:#E2F6FA;--chip-ink:#0B6072;
    --sans:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:44px 44px}
  .shell{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 18px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:22px 2px 12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:14px;letter-spacing:1px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan)}
  .prog{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--faint)}
  .prog b{color:var(--cyan-deep)}
  #chat{flex:1;display:flex;flex-direction:column;gap:14px;padding:14px 0 8px}
  .msg{max-width:86%;animation:rise .28s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .bot{align-self:flex-start}
  .bot .label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--cyan-deep);margin:0 0 5px 2px;text-transform:uppercase}
  .bot .body{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:4px 12px 12px 12px;padding:13px 15px;font-size:15px;line-height:1.45}
  .me{align-self:flex-end}
  .me .body{background:var(--chip);color:var(--chip-ink);border-radius:12px 12px 4px 12px;padding:11px 15px;font-size:15px;line-height:1.4}
  .typing .body{color:var(--muted);font-family:var(--mono);font-size:13px}
  form#composer{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 22%);padding:12px 0 22px;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;background:#fff;border:1px solid var(--border);border-radius:12px;color:var(--ink);
    font-family:var(--sans);font-size:15px;padding:12px 14px;resize:none;max-height:140px;min-height:48px;line-height:1.4}
  textarea:focus{outline:2px solid var(--cyan);outline-offset:1px;border-color:var(--cyan)}
  .send{background:var(--cyan);color:#04222a;border:none;border-radius:12px;width:52px;height:48px;font-size:20px;cursor:pointer;flex:none;transition:filter .15s}
  .send:hover{filter:brightness(1.06)}.send:disabled{opacity:.45;cursor:not-allowed}
  /* results */
  #out{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:8px 0 4px}
  @media(max-width:720px){#out{grid-template-columns:1fr}.shell{max-width:100%}}
  .p{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;animation:rise .3s ease both}
  .p.primary{border-color:var(--cyan)}
  .p .bar{position:absolute;top:0;left:0;right:0;height:5px;background:#E1E7EF}.p.primary .bar{background:var(--cyan)}
  .rank{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--faint)}.p.primary .rank{color:var(--cyan-deep)}
  .name{font-size:19px;font-weight:700;margin:7px 0 2px}.role{font-size:12.5px;color:var(--muted)}
  .p hr{border:none;border-top:1px solid var(--line);margin:12px 0}
  .sec{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--faint);margin:12px 0 4px;text-transform:uppercase}
  .val{font-size:12.5px;color:#37455A;line-height:1.5}.q-quote{font-style:italic;color:#6B7789;font-size:12px}
  .lead{color:var(--cyan-deep)}.serve{margin-top:12px;font-family:var(--mono);font-size:11.5px;background:#EFF3F8;border-radius:7px;padding:8px 11px;color:var(--muted)}
  .p.primary .serve{background:var(--chip);color:var(--chip-ink)}
  .summary{border-left:3px solid var(--cyan);background:#F1FBFD;border-radius:0 10px 10px 0;padding:15px 17px;margin:6px 0}
  .summary h3{margin:0 0 5px;font-size:15px}.summary p{margin:0;font-size:14px;color:#37455A;line-height:1.55}
  .err{color:#c0392b;font-family:var(--mono);font-size:13px}
  .dlbtn{align-self:flex-start;margin:2px 0 6px;background:#fff;color:var(--cyan-deep);border:1px solid var(--cyan);
    border-radius:9px;padding:9px 14px;font-family:var(--mono);font-size:12.5px;cursor:pointer;transition:background .15s}
  .dlbtn:hover{background:var(--chip)}
  .capture{background:#F1FBFD;border:1px solid var(--cyan);border-radius:12px;padding:16px 18px;margin:8px 0 2px;animation:rise .3s ease both}
  .capture b{font-size:15px}.capture p{margin:5px 0 11px;font-size:13px;color:var(--muted)}
  .capform{display:flex;gap:8px;flex-wrap:wrap}
  .capform input{flex:1;min-width:180px;background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 13px;font-size:14.5px;font-family:var(--sans)}
  .capform input:focus{outline:2px solid var(--cyan);border-color:var(--cyan)}
  .capform button{background:var(--cyan);color:#04222a;border:none;border-radius:9px;padding:11px 16px;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer}
  .capform button:disabled{opacity:.5}
  .capmsg{margin-top:8px;font-family:var(--mono);font-size:12.5px}.capok{color:var(--cyan-deep)}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand"><span class="dot"></span>scalewithme · avatar builder</div>
    <div class="prog" id="prog"></div>
  </header>
  <div id="chat" aria-live="polite"></div>
  <form id="composer" autocomplete="off">
    <textarea id="in" rows="1" placeholder="Type your answer…" aria-label="Your answer"></textarea>
    <button class="send" id="send" type="submit" aria-label="Send">↑</button>
  </form>
</div>

<script>
const QS=[
  {label:"01 · The product",q:"What did you build — or want to build? One sentence."},
  {label:"02 · Who lit up",q:"Who have you seen get the most value — who <em>lit up</em> using it? A specific real person is best."},
  {label:"03 · The problem",q:"What painful, expensive, or recurring problem does it kill for them?"},
  {label:"04 · Today instead",q:"What are they doing <em>today instead</em> — a tool, a hack, a person, or nothing?"},
  {label:"05 · Their words",q:"In their own words, how do they describe the problem? Real quotes if you have them."}
];
const chat=document.getElementById("chat"),input=document.getElementById("in"),
  send=document.getElementById("send"),prog=document.getElementById("prog"),composer=document.getElementById("composer");
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
let step=-1, answers=[];

function scroll(){chat.parentElement.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});}
function bot(html,label){const d=document.createElement("div");d.className="msg bot";d.innerHTML=(label?`<div class="label">${label}</div>`:"")+`<div class="body">${html}</div>`;chat.appendChild(d);scroll();return d;}
function me(text){const d=document.createElement("div");d.className="msg me";d.innerHTML=`<div class="body">${esc(text)}</div>`;chat.appendChild(d);scroll();}
function setProg(){prog.innerHTML = step>=0&&step<QS.length ? `QUESTION <b>${step+1}</b> OF ${QS.length}` : (step>=QS.length?"BUILDING…":"");}

function ask(){setProg();const cur=QS[step];bot(cur.q,cur.label);}
function start(){
  bot("Hi — I'm your avatar strategist. I'll ask you <b>5 quick questions</b> about your business, then build and rank <b>3 customer personas</b> for you.");
  setTimeout(()=>{step=0;ask();},450);
}
function autosize(){input.style.height="auto";input.style.height=Math.min(input.scrollHeight,140)+"px";}
input.addEventListener("input",autosize);
input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();composer.requestSubmit();}});

composer.addEventListener("submit",e=>{
  e.preventDefault();
  const v=input.value.trim(); if(!v||step<0||step>=QS.length)return;
  me(v); answers[step]=v; input.value="";autosize();
  step++;
  if(step<QS.length){setTimeout(ask,380);}
  else{generate();}
});

async function generate(){
  setProg(); input.disabled=true; send.disabled=true;
  const t=bot('<span style="opacity:.8">mapping segments · drafting three avatars · ranking them…</span>');t.classList.add("typing");
  try{
    const body={q1:answers[0]||"",q2:answers[1]||"",q3:answers[2]||"",q4:answers[3]||"",q5:answers[4]||""};
    const r=await fetch("/api/generate",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok)throw new Error("server "+r.status);
    const data=await r.json();
    if(data.error)throw new Error(data.error);
    t.remove(); prog.textContent="DONE"; renderResults(data);
  }catch(err){
    t.querySelector(".body").innerHTML=`<span class="err">Couldn't generate (${esc(err.message)}). Refresh and try again.</span>`;
    input.disabled=false;send.disabled=false;
  }
}
function renderResults(d){
  bot("Here are your three ranked avatars 👇");
  if(d.leadWith){const s=document.createElement("div");s.className="summary";s.innerHTML=`<h3>Who to lead with</h3><p>${esc(d.leadWith)}</p>`;chat.appendChild(s);}
  const out=document.createElement("div");out.id="out";chat.appendChild(out);
  (d.avatars||[]).forEach(p=>{
    const primary=(p.rank||"").toUpperCase()==="PRIMARY";
    const lang=(p.language||[]).map(q=>`<div class="q-quote">“${esc(q)}”</div>`).join("");
    out.insertAdjacentHTML("beforeend",`<div class="p ${primary?"primary":""}"><div class="bar"></div>
      <div class="rank">▲ ${esc(p.rank||"")}</div><div class="name">${esc(p.name||"")}</div><div class="role">${esc(p.role||"")}</div><hr>
      <div class="sec">Snapshot</div><div class="val">${esc(p.snapshot||"")}</div>
      <div class="sec">Jobs to be done</div><div class="val">Functional — ${esc(p.jtbd&&p.jtbd.functional)}<br>Emotional — ${esc(p.jtbd&&p.jtbd.emotional)}<br>Social — ${esc(p.jtbd&&p.jtbd.social)}</div>
      <div class="sec">Acute problem</div><div class="val">${esc(p.acute||"")}</div>
      <div class="sec">Current alternative</div><div class="val">${esc(p.alternative||"")}</div>
      <div class="sec">Their language</div>${lang}
      <div class="sec">Channels</div><div class="val"><span class="lead">▸ Lead: ${esc(p.channelLead||"")}</span><br>Hidden gems: ${esc(p.channelGems||"")}</div>
      <div class="sec">Anti-fit</div><div class="val">${esc(p.antiFit||"")}</div>
      <div class="sec">Riskiest assumption</div><div class="val">${esc(p.riskiest||"")}</div>
      <div class="sec">The 3 moves</div><div class="val">Msg — ${esc(p.moves&&p.moves.message)}<br>Channel — ${esc(p.moves&&p.moves.channel)}<br>Offer — ${esc(p.moves&&p.moves.offer)}</div>
      <div class="serve">SERVE VIA ▸ ${esc(p.serveVia||"")} ↗</div></div>`);
  });
  const cap=document.createElement("div");cap.className="capture";
  cap.innerHTML=`<b>Keep these + get the next tool</b>
    <p>Drop your email — I'll send the overview and ping you when the next free workflow tool drops. No spam.</p>
    <form class="capform"><input type="email" placeholder="you@email.com" required aria-label="Email"><button type="submit">Email it to me →</button></form>
    <div class="capmsg"></div>`;
  chat.appendChild(cap);
  const dl=document.createElement("button");dl.className="dlbtn";dl.type="button";
  dl.textContent="↓ Or just download it (.md)";dl.onclick=()=>downloadMd(d);chat.appendChild(dl);
  cap.querySelector(".capform").addEventListener("submit",async e=>{
    e.preventDefault();
    const btn=cap.querySelector("button"),msg=cap.querySelector(".capmsg"),email=cap.querySelector("input").value.trim();
    btn.disabled=true;msg.textContent="";
    try{
      const r=await fetch("/api/subscribe",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email,product:answers[0]||""})});
      const j=await r.json();
      if(!r.ok||j.error)throw new Error(j.error||("server "+r.status));
      cap.querySelector(".capform").style.display="none";
      msg.innerHTML='<span class="capok">✓ You’re on the list — downloading your overview…</span>';
      downloadMd(d);
    }catch(err){msg.innerHTML='<span class="err">'+esc(err.message)+'</span>';btn.disabled=false;}
  });
  scroll();
}
function downloadMd(d){
  const av=d.avatars||[];
  const brief=av.map((p,i)=>`${i+1}. **${p.rank} — ${p.name}** — ${p.role}. → *${p.serveVia||""}*`).join("\n");
  const detail=av.map(p=>`### ${p.rank} — ${p.name}\n_${p.role}_\n
- **Snapshot:** ${p.snapshot||""}
- **Jobs to be done:** functional — ${p.jtbd&&p.jtbd.functional}; emotional — ${p.jtbd&&p.jtbd.emotional}; social — ${p.jtbd&&p.jtbd.social}
- **Acute problem:** ${p.acute||""}
- **Current alternative:** ${p.alternative||""}
- **Their language:** ${(p.language||[]).map(q=>`"${q}"`).join(" · ")}
- **Channels:** lead — ${p.channelLead||""}; hidden gems — ${p.channelGems||""}
- **Anti-fit:** ${p.antiFit||""}
- **Riskiest assumption:** ${p.riskiest||""}
- **3 moves:** message — ${p.moves&&p.moves.message}; channel — ${p.moves&&p.moves.channel}; offer — ${p.moves&&p.moves.offer}
- **Serve via:** ${p.serveVia||""}`).join("\n\n");
  const md=`# Customer Personas\n\n${d.leadWith?`**Who to lead with:** ${d.leadWith}\n\n`:""}## The three, in brief\n${brief}\n\n## Details\n${detail}\n\n---\n_Built with the ScaleWithMe Avatar Builder — scalewithme-avatar.pages.dev_\n`;
  const blob=new Blob([md],{type:"text/markdown"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="personas.md";a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
start();
</script>
</body>
</html>
