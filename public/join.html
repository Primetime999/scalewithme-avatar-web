<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join the list — ScaleWithMe</title>
<style>
  :root{
    --bg:#FFFFFF;--grid:#F0F3F7;--ink:#0C1B2A;--muted:#6C7A8C;--faint:#97A2B2;
    --line:#E7ECF2;--border:#D8DFEA;--panel:#FBFDFE;
    --cyan:#12B5CE;--cyan-deep:#0E8FA6;--chip:#E2F6FA;--chip-ink:#0B6072;
    --sans:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:44px 44px}
  .card{max-width:440px;width:100%;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px 26px}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--muted);margin-bottom:18px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan)}
  h1{font-size:22px;margin:0 0 8px;letter-spacing:-.3px}
  p.sub{color:var(--muted);font-size:14.5px;line-height:1.5;margin:0 0 20px}
  form{display:flex;gap:8px;flex-wrap:wrap}
  input{flex:1;min-width:200px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--sans)}
  input:focus{outline:2px solid var(--cyan);outline-offset:1px;border-color:var(--cyan)}
  button{background:var(--cyan);color:#04222a;border:none;border-radius:10px;padding:12px 18px;font-family:var(--mono);font-size:13.5px;font-weight:700;cursor:pointer;transition:filter .15s}
  button:hover{filter:brightness(1.06)}button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:12px;font-family:var(--mono);font-size:13px}.ok{color:var(--cyan-deep)}.err{color:#c0392b}
  .fine{margin-top:16px;font-size:12px;color:var(--faint)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="dot"></span>scalewithme</div>
    <h1>Get the next free tool</h1>
    <p class="sub">You've got your personas. Drop your email and I'll send you the next free workflow tool
      the moment it drops — plus the weekly live-build where we put these tools to work. No spam.</p>
    <form id="f">
      <input id="email" type="email" placeholder="you@email.com" required aria-label="Email">
      <button id="btn" type="submit">Join →</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="fine">Built on the near-free stack. Unsubscribe anytime.</div>
  </div>
<script>
  var params=new URLSearchParams(location.search);
  var source=(params.get("source")||"join").slice(0,40);
  var f=document.getElementById("f"),btn=document.getElementById("btn"),msg=document.getElementById("msg"),email=document.getElementById("email");
  f.addEventListener("submit",async function(e){
    e.preventDefault();
    btn.disabled=true;msg.textContent="";msg.className="msg";
    try{
      var r=await fetch("/api/subscribe",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email:email.value.trim(),source:source})});
      var j=await r.json();
      if(!r.ok||j.error)throw new Error(j.error||("server "+r.status));
      f.style.display="none";
      msg.className="msg ok";msg.textContent="✓ You're on the list. Talk soon.";
    }catch(err){msg.className="msg err";msg.textContent=err.message;btn.disabled=false;}
  });
</script>
</body>
</html>
